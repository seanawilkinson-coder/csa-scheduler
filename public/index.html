function evById(id) { return ALL_EVENTS.find(e => e.id === id); }

function weekendMatchesSeason(wknd) {
  const f = appState.seasonFilter;
  if (f === 'full') return true;
  const m = (wknd.relLabel || '').substring(0, 3);
  const fallMonths = ['Oct', 'Nov', 'Dec'];
  if (f === 'fall') return fallMonths.includes(m);
  if (f === 'spring') return !fallMonths.includes(m);
  return true;
}

function deepCopy(obj) { return JSON.parse(JSON.stringify(obj)); }

function getAfterMlkKey(year) {
  const w = yearData[year].weekends.find(w => w.afterMlk);
  return w ? w.key : null;
}

function getLastFebKey(year) {
  const w = yearData[year].weekends.find(w => w.lastFeb);
  return w ? w.key : null;
}

/** Returns set of event IDs that are locked (placed by rule) for a given year and ruleObj */
function getLockedSet(year, ruleObj) {
  const s = new Set();
  if (ruleObj.keepIndividuals) s.add('individuals');
  if (ruleObj.keepHsNationals) s.add('hs-nationals');
  return s;
}

/** Returns locked event -> weekendKey map for a year and ruleObj */
function getLockedMap(year, ruleObj) {
  const m = {};
  if (ruleObj.keepIndividuals) {
    const key = getAfterMlkKey(year);
    if (key) m['individuals'] = key;
  }
  if (ruleObj.keepHsNationals) {
    const key = getLastFebKey(year);
    if (key) m['hs-nationals'] = key;
  }
  return m;
}

/** Returns the appropriate ruleObj for a given year, column, and mode */
function getScenarioRuleObj(year, colIndex, mode) {
  if (mode === 'across') return crossRules[year];
  if (mode === 'master') return masterRules[year];
  return scenarioRules[year][colIndex] || { keepIndividuals: false, keepHsNationals: false };
}

/** Apply rules: force locked events into their required weekends for a year */
function applyRules(year) {
  // Within-year placements: each scenario has its own rules
  for (let s = 0; s < 3; s++) {
    const locked = getLockedMap(year, scenarioRules[year][s]);
    Object.entries(locked).forEach(([evId, targetKey]) => {
      // remove from wherever
      Object.keys(placements[year][s]).forEach(k =>{
        placements[year][s][k] = (placements[year][s][k] || []).filter(x => x !== evId);
      });
      // force place
      if (!placements[year][s][targetKey]) placements[year][s][targetKey] = [];
      if (!placements[year][s][targetKey].includes(evId)) {
        placements[year][s][targetKey].push(evId);
      }
    });
  }

  // Across-years placements: each year has its owncross rules
  const crossLocked = getLockedMap(year, crossRules[year]);
  Object.entries(crossLocked).forEach(([evId, targetKey]) => {
    Object.keys(crossPlacements[year]).forEach(k =>{
      crossPlacements[year][k] = (crossPlacements[year][k] || []).filter(x => x !== evId);
    });
    if (!crossPlacements[year][targetKey]) crossPlacements[year][targetKey] = [];
    if (!crossPlacements[year][targetKey].includes(evId)) {
      crossPlacements[year][targetKey].push(evId);
    }
  });
}

/** Get the set of placed event IDs for a specific column */
function getPlacedSet(year, sIdx, mode) {
  const placed = new Set();
  if (mode === 'within') {
    Object.values(placements[year][sIdx]).forEach(arr => arr.forEach(id => placed.add(id)));
  } else {
    Object.values(crossPlacements[year]).forEach(arr => arr.forEach(id => placed.add(id)));
  }
  return placed;
}

/** Get the relative weekend map for across-years mode: relLabel -> [{ year, wknd }] */
function getRelativeWeekendRows() {
  // Collect all unique relLabels in order (from any active year)
  const seen = [];
  const seenSet = new Set();
  appState.acrossYears.forEach(yr => {
    yearData[yr].weekends.forEach(w => {
      if (!seenSet.has(w.relLabel)) {
        seenSet.add(w.relLabel);
        seen.push(w.relLabel);
      }
    });
  });
  return seen;
}

// ────────────────────────────────────────────────────────────────────────────
// CHIP CREATION
// ────────────────────────────────────────────────────────────────────────────

function makeChip(evId, opts = {}) {
  // opts: { locked, removable, colIndex, fromKey, year }
  const ev = evById(evId);
  const chip = document.createElement('div');
  chip.className = `chip ${ev ? ev.type : 'csa'}${opts.locked ? ' locked' : ''}`;
  chip.draggable = !opts.locked;
  chip.dataset.id = evId;
  if (opts.colIndex !== undefined) chip.dataset.colIndex = opts.colIndex;
  if (opts.fromKey) chip.dataset.fromKey = opts.fromKey;
  if (opts.year) chip.dataset.year = opts.year;

  // Org badge
  if (!opts.locked) {
    const badge = document.createElement('span');
    badge.className = 'chip-org';
    badge.textContent = (ev && ev.type === 'us') ? 'USS' : 'CSA';
    chip.appendChild(badge);
  }

  if (opts.locked) {
    const icon = document.createElement('span');
    icon.className = 'chip-lock-icon';
    icon.textContent = '🔒';
    chip.appendChild(icon);
    chip.appendChild(document.createTextNode('\u00A0' + (ev ? ev.name : evId)));
  } else {
    const nameEl = document.createElement('span');
    nameEl.style.flex = '1';
    nameEl.textContent = ev ? ev.name : evId;
    chip.appendChild(nameEl);
    if (ev && ev.location && opts.inZone) {
      const loc = document.createElement('span');
      loc.className = 'chip-location';
      loc.textContent = '📍 ' + ev.location;
      nameEl.appendChild(loc);
    }
    if (opts.removable) {
      const rm = document.createElement('span');
      rm.className = 'chip-remove';
      rm.textContent = '\u00D7';
      rm.addEventListener('click', e => {
        e.stopPropagation();
        handleChipRemove(evId, opts);
      });
      chip.appendChild(rm);
    }
  }
  return chip;
}

function handleChipRemove(evId, opts) {
  if (opts.colIndex === 99) {
    // Current calendar mode
    currentPlacements[opts.year][opts.fromKey] = (currentPlacements[opts.year][opts.fromKey] || []).filter(x => x !== evId);
  } else if (appState.mode === 'within') {
    const yr = opts.year || appState.withinYear;
    placements[yr][opts.colIndex][opts.fromKey] = (placements[yr][opts.colIndex][opts.fromKey] || []).filter(x => x !== evId);
  } else {
    crossPlacements[opts.year][opts.fromKey] = (crossPlacements[opts.year][opts.fromKey] || []).filter(x => x !== evId);
  }
  renderAll();
}

// ────────────────────────────────────────────────────────────────────────────
// DRAG HELPERS
// ────────────────────────────────────────────────────────────────────────────

function setDragActive(activeColIndex) {
  document.querySelectorAll('.drop-zone').forEach(z=> {
    z.classList.toggle('drag-inactive', parseInt(z.dataset.colIndex) !== activeColIndex);
  });
}

function clearDragActive() {
  document.querySelectorAll('.drop-zone').forEach(z=> {
    z.classList.remove('drag-inactive');
    z.classList.remove('drag-over');
  });
}

function bindChipDrag(chip, colIndex, fromKey, year) {
  chip.addEventListener('dragstart', e => {
    dragId = chip.dataset.id;
    dragColIndex = colIndex;
    dragSourceKey = fromKey || null;
    dragYear = year;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => chip.classList.add('dragging'), 0);
    setDragActive(colIndex);
  });
  chip.addEventListener('dragend', () => {
    chip.classList.remove('dragging');
    clearDragActive();
    dragId = null; dragColIndex = null; dragSourceKey = null; dragYear = null;
  });
}

function bindDropZone(zone, colIndex, weekendKey, year) {
  zone.addEventListener('dragover', e => {
    if (dragColIndex === colIndex && dragYear === year) {
      e.preventDefault();
      zone.classList.add('drag-over');
    }
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (dragId === null || dragColIndex !== colIndex || dragYear !== year) return;
    const lockedSet = getLockedSet(year, getScenarioRuleObj(year, colIndex, appState.mode));
    if (lockedSet.has(dragId)) return;

    if (appState.mode === 'within') {
      // remove from source
      if (dragSourceKey !== null) {
        placements[year][colIndex][dragSourceKey] =(placements[year][colIndex][dragSourceKey] || []).filter(x => x !== dragId);
      }
      // add to target
      if (!placements[year][colIndex][weekendKey]) placements[year][colIndex][weekendKey] = [];
      if (!placements[year][colIndex][weekendKey].includes(dragId)) {
        placements[year][colIndex][weekendKey].push(dragId);
      }
    } else {
      if (dragSourceKey !== null) {
        crossPlacements[year][dragSourceKey] = (crossPlacements[year][dragSourceKey] || []).filter(x =>x !== dragId);
      }
      if (!crossPlacements[year][weekendKey]) crossPlacements[year][weekendKey] = [];
      if (!crossPlacements[year][weekendKey].includes(dragId)) {
        crossPlacements[year][weekendKey].push(dragId);
      }
    }

    dragId = null; dragColIndex = null; dragSourceKey = null; dragYear = null;
    renderAll();
  });
}

function bindBankDropZone(bank, colIndex, year) {
  bank.addEventListener('dragover', e => {
    if (dragColIndex === colIndex && dragYear === year && dragSourceKey !== null) {
      e.preventDefault();
      bank.classList.add('bank-drop-target');
    }
  });
  bank.addEventListener('dragleave', () => bank.classList.remove('bank-drop-target'));
  bank.addEventListener('drop', e => {
    e.preventDefault();
    bank.classList.remove('bank-drop-target');
    if (dragId === null || dragColIndex !== colIndex || dragYear !== year || dragSourceKey === null) return;
    const lockedSet = getLockedSet(year, getScenarioRuleObj(year, colIndex, appState.mode));
    if (lockedSet.has(dragId)) return;

    if (appState.mode === 'within') {
      placements[year][colIndex][dragSourceKey] = (placements[year][colIndex][dragSourceKey] || []).filter(x => x !== dragId);
    } else {
      crossPlacements[year][dragSourceKey] = (crossPlacements[year][dragSourceKey] || []).filter(x => x!== dragId);
    }

    dragId = null; dragColIndex = null; dragSourceKey = null; dragYear = null;
    renderAll();
  });
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER: Scenario / Year column headers
// ────────────────────────────────────────────────────────────────────────────

function renderScenarioHeaders() {
  if (appState.mode === 'master') { renderMasterHeaders(); return; }
  if (appState.mode === 'current') { renderCurrentHeaders(); return; }

  const container = document.getElementById('scenario-headers');
  container.innerHTML = '';

  const spacer = document.createElement('div');
  spacer.className = 'scenario-header-spacer';
  const collapseBtn = document.createElement('button');
  collapseBtn.className = 'collapse-toggle';
  collapseBtn.title = 'Hide event bank';
  collapseBtn.textContent = '▲';
  collapseBtn.addEventListener('click', toggleEventBank);
  spacer.appendChild(collapseBtn);
  container.appendChild(spacer);

  const presenting = appState.presenting;

  if (appState.mode === 'within') {
    // ── Within-year: one col per scenario ──
    const yr = appState.withinYear;
    const count = appState.expandedCol !== null ? 1: appState.scenarioCount;
    const idxList = appState.expandedCol !== null ?[appState.expandedCol] : Array.from({length: count}, (_,i) => i);

    idxList.forEach((s, renderPos) => {
      const ruleObj = scenarioRules[yr][s];
      const placed = getPlacedSet(yr, s, 'within');
      const lockedSet = getLockedSet(yr, ruleObj);
      const header = buildColHeader({
        colIndex: s,
        renderPos,
        label: scenarioLabels[yr][s],
        onLabelChange: v => { scenarioLabels[yr][s]= v; },
        year: yr,
        placed, lockedSet,
        ruleObj,
        mode: 'within',
      });
      container.appendChild(header);
    });

  } else {
    // ── Across-years: one col per selected year ──
    appState.acrossYears.forEach((yr, renderPos) =>{
      const ruleObj = crossRules[yr];
      const placed = getPlacedSet(yr, 0, 'across');
      const lockedSet = getLockedSet(yr, ruleObj);
      const header = buildColHeader({
        colIndex: renderPos,
        renderPos,
        label: yr.replace('-', '–'),
        onLabelChange: null, // read-only year label
        year: yr,
        placed, lockedSet,
        ruleObj,
        mode: 'across',
      });
      container.appendChild(header);
    });
  }

  // Re-apply collapsed state — container is rebuilt on every render
  if (bankCollapsed) {
    container.classList.add('collapsed');
    document.getElementById('collapsed-bar').classList.add('visible');
  } else {
    container.classList.remove('collapsed');
    document.getElementById('collapsed-bar').classList.remove('visible');
  }
}

function buildColHeader({ colIndex, renderPos, label, onLabelChange, year, placed, lockedSet, ruleObj, mode }) {
  const presenting = appState.presenting;
  const header = document.createElement('div');
  header.className = 'scenario-header';

  // Label row
  const labelWrap = document.createElement('div');
  labelWrap.className = 'scenario-label-wrap';

  const idxSpan = document.createElement('span');
  idxSpan.className = 'scenario-index';
  idxSpan.textContent = mode === 'within' ? (colIndex + 1) : year;
  labelWrap.appendChild(idxSpan);

  if (onLabelChange && !presenting) {
    const input = document.createElement('input');
    input.type = 'text';
    input.className = 'scenario-label-input';
    input.value = label;
    input.addEventListener('input', e => onLabelChange(e.target.value));
    labelWrap.appendChild(input);
  } else {
    const sp = document.createElement('span');
    sp.className = 'scenario-label-input';
    sp.style.cursor = 'default';
    sp.textContent = label;
    labelWrap.appendChild(sp);
  }

  header.appendChild(labelWrap);

  // Action icons (hidden in presentation mode)
  if (!presenting) {
    const icons = document.createElement('div');
    icons.className = 'header-icons';

    // Expand icon
    const expandBtn = document.createElement('button');
    expandBtn.className = 'icon-btn';
    expandBtn.title = 'Expand column';
    expandBtn.textContent = '\u26F6'; // ⛶
    expandBtn.addEventListener('click', () => enterExpandedView(colIndex, year, mode));
    icons.appendChild(expandBtn);

    // Save variation icon
    const saveBtn = document.createElement('button');
    saveBtn.className = 'icon-btn';
    saveBtn.title = 'Save variation';
    saveBtn.textContent = '\uD83D\uDCBE'; // 💾
    saveBtn.addEventListener('click', () => openSavePanel(colIndex, year, mode));
    icons.appendChild(saveBtn);

    header.appendChild(icons);

    // → Master button (within-year mode only)
    if (mode === 'within') {
      const masterBtn = document.createElement('button');
      const alreadySaved = Object.keys(masterPlacements[year]).length > 0;
      masterBtn.className = 'master-save-btn' + (alreadySaved ? ' saved' : '');
      masterBtn.textContent = alreadySaved ? '★ In Planner' : '→ Save to Planner';
      masterBtn.title = 'Commit this iteration to the Planner for ' + year.replace('-','–');
      masterBtn.addEventListener('click', () => {
        masterPlacements[year] = deepCopy(placements[year][colIndex]);
        masterRules[year] = { ...scenarioRules[year][colIndex] };
        renderScenarioHeaders(); // refresh the button state
      });
      header.appendChild(masterBtn);
    }
  }

  // Chip bank (hidden in presentation mode)
  if (!presenting) {
    const bank = document.createElement('div');
    bank.className = 'scenario-chip-bank';
    bank.dataset.colIndex = colIndex;
    bank.dataset.year = year;

    const available = ALL_EVENTS.filter(ev => !placed.has(ev.id) && !lockedSet.has(ev.id));
    if (available.length === 0) {
      const empty = document.createElement('span');
      empty.className = 'bank-empty';
      empty.textContent = 'all placed';
      bank.appendChild(empty);
    } else {
      const csaEvents = available.filter(ev => ev.type === 'csa');
      const usEvents  = available.filter(ev => ev.type === 'us');

      if (csaEvents.length) {
        const lbl = document.createElement('div');
        lbl.style.cssText = 'font-size:5.5pt;font-weight:900;letter-spacing:1.5pt;text-transform:uppercase;color:#aaa;width:100%;margin-bottom:1px;';
        lbl.textContent = 'CSA';
        bank.appendChild(lbl);
        csaEvents.forEach(ev => {
          const chip = makeChip(ev.id, { colIndex, year });
          bindChipDrag(chip, colIndex, null, year);
          bank.appendChild(chip);
        });
      }

      if (usEvents.length) {
        if (csaEvents.length) {
        }
        const lbl = document.createElement('div');
        lbl.style.cssText = 'font-size:5.5pt;font-weight:900;letter-spacing:1.5pt;text-transform:uppercase;color:#aaa;width:100%;margin-top:4px;margin-bottom:1px;';
        lbl.textContent = 'US SQUASH';
        bank.appendChild(lbl);
        usEvents.forEach(ev => {
          const chip = makeChip(ev.id, { colIndex, year });
          bindChipDrag(chip, colIndex, null, year);
          bank.appendChild(chip);
        });
      }
    }
    bindBankDropZone(bank, colIndex, year);
    header.appendChild(bank);
  }

  // Per-column rule toggles (hidden in presentation mode)
  if (!presenting) {
    const colRules = document.createElement('div');
    colRules.className = 'col-rules';

    const ruleDefs = [
      { key: 'keepIndividuals', label: 'Keep Individuals' },
      { key: 'keepHsNationals', label: 'Keep HS Nationals' },
    ];

    ruleDefs.forEach(({ key, label: ruleLabel }) =>{
      const toggle = document.createElement('div');
      toggle.className = 'col-rule-toggle' + (ruleObj[key] ? ' on' : '');

      const pip = document.createElement('div');
      pip.className = 'col-rule-pip';
      toggle.appendChild(pip);

      const txt = document.createElement('span');
      txt.textContent = ruleLabel;
      toggle.appendChild(txt);

      toggle.addEventListener('click', () => {
        ruleObj[key] = !ruleObj[key];

        // If turning OFF, scrub that event from this column's placements
        if (!ruleObj[key]) {
          const evId = key === 'keepIndividuals' ? 'individuals' : 'hs-nationals';
          if (mode === 'within') {
            Object.keys(placements[year][colIndex]).forEach(k => {
              placements[year][colIndex][k] = (placements[year][colIndex][k] || []).filter(x => x !== evId);
            });
          } else {
            Object.keys(crossPlacements[year]).forEach(k => {
              crossPlacements[year][k] = (crossPlacements[year][k] || []).filter(x => x !== evId);
            });
          }
        }

        renderAll();
      });

      colRules.appendChild(toggle);
    });

    header.appendChild(colRules);
  }

  return header;
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER: Calendar rows
// ────────────────────────────────────────────────────────────────────────────

function renderCalendar() {
  const cal = document.getElementById('calendar');
  cal.innerHTML = '';

  if (appState.mode === 'within') {
    renderWithinYearCalendar(cal);
  } else if (appState.mode === 'across') {
    renderAcrossYearsCalendar(cal);
  } else if (appState.mode === 'current') {
    renderCurrentCalendar(cal);
  } else {
    renderMasterCalendar(cal);
  }
}

function renderWithinYearCalendar(cal) {
  const yr = appState.withinYear;
  const data = yearData[yr];
  const presenting = appState.presenting;

  // Which scenario columns to show
  const idxList = appState.expandedCol !== null
    ? [appState.expandedCol]
    : Array.from({length: appState.scenarioCount}, (_, i) => i);

  let lastRenderedMonth = null;
  data.weekends.forEach(wknd => {
    if (!weekendMatchesSeason(wknd)) return;

    if (wknd.month && wknd.month !== lastRenderedMonth) {
      cal.appendChild(makeMonthHeader(wknd.month));
      lastRenderedMonth = wknd.month;
    }

    const row = makeWeekendRow(wknd, yr, presenting);

    idxList.forEach((s, renderPos) => {
      const ruleObj = scenarioRules[yr][s];
      const lockedSet = getLockedSet(yr, ruleObj);
      const evIds = (placements[yr][s][wknd.key] ||[]).filter(Boolean);
      const zone = makeDropZone(evIds, s, wknd, yr,lockedSet, presenting);
      row.appendChild(zone);
    });

    cal.appendChild(row);
  });
}

function renderAcrossYearsCalendar(cal) {
  // Build list of relative row labels (e.g. "Jan W1", "Jan W2", ...)
  const relRows = getRelativeWeekendRows();
  const presenting = appState.presenting;

  // Group by month prefix
  let lastMonth = null;

  relRows.forEach(relLabel => {
    // Determine month from first word of relLabel
    const month = relLabel.split(' ')[0]; // "Jan","Feb", "Mar"
    const fullMonth = { Jan: 'January', Feb: 'February', Mar: 'March', Oct: 'October', Nov: 'November', Dec: 'December' }[month] || month;

    // Season filter: skip rows where all years' weekends fall outside current filter
    const anyMatch = appState.acrossYears.some(yr => {
      const w = yearData[yr].weekends.find(x => x.relLabel === relLabel);
      return w && weekendMatchesSeason(w);
    });
    if (!anyMatch) return;

    if (fullMonth !== lastMonth) {
      cal.appendChild(makeMonthHeader(fullMonth));
      lastMonth = fullMonth;
    }

    // Build the row
    const row = document.createElement('div');
    row.className = 'weekend-row';

    // Label column: show relLabel, and actual dates per column in sub-text (shown in zone)
    const lbl = document.createElement('div');
    lbl.className = 'wknd-label';
    // relLabel is e.g. "Jan W1" — split into month+ week number
    const relParts = relLabel.split(' '); // ["Jan", "W1"]
    const relMonth = document.createElement('div');
    relMonth.className = 'wknd-month';
    relMonth.textContent = relParts[0];
    lbl.appendChild(relMonth);

    const dateDiv = document.createElement('div');
    dateDiv.className = 'wknd-date';
    dateDiv.style.fontSize = '13pt'; // slightly smaller for "W1" vs date numbers
    dateDiv.textContent = relParts[1] || relLabel;
    lbl.appendChild(dateDiv);

    const relDaynames = document.createElement('div');
    relDaynames.className = 'wknd-daynames';
    relDaynames.textContent = 'Fri – Sun';
    lbl.appendChild(relDaynames);

    row.appendChild(lbl);

    // One drop zone per selected year
    appState.acrossYears.forEach((yr, renderPos) =>{
      const lockedSet = getLockedSet(yr, crossRules[yr]);
      // Find the actual weekend for this year matching relLabel
      const wknd = yearData[yr].weekends.find(w => w.relLabel === relLabel);

      if (!wknd) {
        // Year doesn't have this weekend (e.g. shorter year)
        const empty = document.createElement('div');
        empty.className = 'drop-zone';
        empty.dataset.colIndex = renderPos;
        empty.style.cssText = 'background:#f9f9f8;pointer-events:none;justify-content:center;align-items:center;';
        const na = document.createElement('span');
        na.style.cssText = 'font-size:12pt;color:#ddd;';
        na.textContent = '—';
        empty.appendChild(na);
        row.appendChild(empty);
        return;
      }

      const evIds = (crossPlacements[yr][wknd.key] || []).filter(Boolean);
      const zone = makeDropZone(evIds, renderPos, wknd, yr, lockedSet, presenting, true);
      row.appendChild(zone);
    });

    cal.appendChild(row);
  });
}

function makeMonthHeader(text) {
  const mh = document.createElement('div');
  mh.className = 'month-header';
  mh.dataset.month = text;
  return mh;
}

function makeWeekendRow(wknd, yr, presenting) {
  const row = document.createElement('div');
  row.className = 'weekend-row';

  const lbl = document.createElement('div');
  lbl.className = 'wknd-label';

  // Split "Jan 8–10" → month "JAN" + days "8–10"
  const parts = wknd.label.split(' '); // ["Jan", "8–10"]
  const monthEl = document.createElement('div');
  monthEl.className = 'wknd-month';
  monthEl.textContent = parts[0];
  lbl.appendChild(monthEl);

  const dateDiv = document.createElement('div');
  dateDiv.className = 'wknd-date';
  dateDiv.textContent = wknd.label.replace(/^\S+\s+/, '');
  lbl.appendChild(dateDiv);

  const daynames = document.createElement('div');
  daynames.className = 'wknd-daynames';
  daynames.textContent = 'Fri – Sun';
  lbl.appendChild(daynames);

  if (wknd.marker) {
    const m = document.createElement('div');
    m.className = 'wknd-marker ' + wknd.marker.cls;
    m.textContent = wknd.marker.text;
    lbl.appendChild(m);
  }

  row.appendChild(lbl);
  return row;
}

/**
 * Build a drop zone for a weekend row column.
 * acrossMode: if true, show actual date sub-label inside zone header
 */
function makeDropZone(evIds, colIndex, wknd, year, lockedSet, presenting, acrossMode = false) {
  const zone = document.createElement('div');
  zone.className = 'drop-zone';
  zone.dataset.colIndex = colIndex;
  zone.dataset.key = wknd.key;
  zone.dataset.year = year;

  // In across-years mode, show the actual Fri dateas a sub-label at top of zone
  if (acrossMode) {
    const sub = document.createElement('div');
    sub.className = 'wknd-actual';
    sub.textContent = wknd.label;
    sub.style.width = '100%';
    if (wknd.marker) {
      sub.textContent += ' · ' + wknd.marker.text;
    }
    if (wknd.afterMlk && lockedSet.has('individuals')) {
      sub.textContent += ' \u21D2 Indiv.';
    }
    zone.appendChild(sub);
  }

  if (evIds.length === 0 && !presenting) {
    const hint = document.createElement('span');
    hint.className = 'drop-hint';
    hint.textContent = 'drop here';
    zone.appendChild(hint);
  } else {
    evIds.forEach(evId => {
      const locked = lockedSet.has(evId);
      const chip = makeChip(evId, {
        locked,
        removable: !locked && !presenting,
        colIndex,
        fromKey: wknd.key,
        year,
        inZone: true,
      });
      if (!locked && !presenting) {
        bindChipDrag(chip, colIndex, wknd.key, year);
      }
      zone.appendChild(chip);
    });
  }

  if (!presenting) {
    bindDropZone(zone, colIndex, wknd.key, year);
  }

  // Venue conflict check
  const specter = evIds.filter(id => {
    const ev = evById(id);
    return ev && ev.location && ev.location.includes('Specter');
  });
  if (specter.length > 1) {
    zone.classList.add('venue-conflict');
    const badge = document.createElement('div');
    badge.className = 'venue-conflict-badge';
    badge.innerHTML = '⚠ Venue conflict — Specter (' + specter.map(id => evById(id).name).join(', ') + ')';
    zone.insertBefore(badge, zone.firstChild);
  }

  return zone;
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER: Expanded single-column view
// ────────────────────────────────────────────────────────────────────────────

function enterExpandedView(colIndex, year, mode) {
  appState.expandedCol = colIndex;
  // For within-year expanded view, just re-render with single column
  renderAll();
}

function exitExpandedView() {
  appState.expandedCol = null;
  renderAll();
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER: Save Panel
// ────────────────────────────────────────────────────────────────────────────

function openSavePanel(colIndex, year, mode) {
  // Close any existing panel
  closeSavePanel();

  // Build inline save panel
  const panel = document.createElement('div');
  panel.className = 'save-panel open';
  panel.id = 'active-save-panel';

  const close = document.createElement('span');
  close.className = 'save-close';
  close.textContent = '×';
  close.addEventListener('click', closeSavePanel);
  panel.appendChild(close);

  const h4 = document.createElement('h4');
  h4.textContent = 'Save Variation';
  panel.appendChild(h4);

  const row = document.createElement('div');
  row.className = 'save-input-row';

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'save-input';
  input.placeholder = 'Name this variation...';
  row.appendChild(input);

  const btn = document.createElement('button');
  btn.className = 'save-btn';
  btn.textContent = 'Save';
  btn.addEventListener('click', () => doSave(input.value.trim(), colIndex, year, mode));
  row.appendChild(btn);

  panel.appendChild(row);

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSave(input.value.trim(), colIndex, year, mode);
  });

  // Find the right scenario-header to attach it to
  const headers = document.querySelectorAll('.scenario-header');
  const targetHeader = headers[mode === 'within'
    ? (appState.expandedCol !== null ? 0 : colIndex)
    : colIndex];

  if (targetHeader) {
    targetHeader.style.position = 'relative';
    targetHeader.appendChild(panel);
  }

  setTimeout(() => input.focus(), 50);
}

function closeSavePanel() {
  const existing = document.getElementById('active-save-panel');
  if (existing) existing.remove();
}

function doSave(name, colIndex, year, mode) {
  if (!name) { alert('Please enter a name for this variation.'); return; }

  let snap;
  if (mode === 'within') {
    snap = deepCopy(placements[year][colIndex]);
  } else {
    snap = deepCopy(crossPlacements[year]);
  }

  savedVariations.push({
    id: Date.now() + Math.random(),
    name,
    year,
    mode,
    scenarioIdx: mode === 'within' ? colIndex : null,
    placements: snap,
    label: mode === 'within' ? scenarioLabels[year][colIndex] : year.replace('-','–'),
  });

  closeSavePanel();

  // Open drawer if not already open, then render the list once
  if (!appState.savedDrawerOpen) {
    appState.savedDrawerOpen = true;
    document.getElementById('saved-drawer').classList.remove('hidden');
    document.getElementById('btn-show-saved').classList.add('highlight');
  }
  renderSavedList();
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER: Saved Variations List
// ────────────────────────────────────────────────────────────────────────────

function loadSavedVariation(sv) {
  if (sv.mode === 'within') {
    placements[sv.year][sv.scenarioIdx ?? 0] = deepCopy(sv.placements);
    if (appState.mode !== 'within') setMode('within');
    if (appState.withinYear !== sv.year) {
      appState.withinYear = sv.year;
      document.querySelectorAll('.year-tab').forEach(t => {
        t.classList.toggle('active', t.dataset.year === sv.year);
      });
    }
  } else {
    crossPlacements[sv.year] = deepCopy(sv.placements);
    if (!appState.acrossYears.includes(sv.year)) appState.acrossYears.push(sv.year);
    if (appState.mode !== 'across') setMode('across');
    document.querySelectorAll('.year-pill').forEach(p => {
      p.classList.toggle('active', appState.acrossYears.includes(p.dataset.year));
    });
  }
  renderAll();
}

function renderSavedList() {
  const list = document.getElementById('saved-list');
  list.innerHTML = '';

  if (savedVariations.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'saved-empty';
    empty.textContent = 'Nothing saved yet.\nUse 💾 on any scenario to save.';
    empty.style.whiteSpace = 'pre-line';
    list.appendChild(empty);
    return;
  }

  // Group by year
  const byYear = {};
  ALL_YEARS.forEach(y => { byYear[y] = []; });
  byYear['multi'] = [];
  savedVariations.forEach(sv => {
    const key = sv.mode === 'across' ? 'multi' : (sv.year || 'multi');
    (byYear[key] = byYear[key] || []).push(sv);
  });

  const yearOrder = [...ALL_YEARS, 'multi'];
  yearOrder.forEach(yr => {
    const items = byYear[yr];
    if (!items || items.length === 0) return;

    const section = document.createElement('div');
    section.className = 'vault-year-section';

    const yLabel = document.createElement('div');
    yLabel.className = 'vault-year-label';
    const yText = document.createElement('span');
    yText.textContent = yr === 'multi' ? 'Multi-Year' : yr.replace('-','–');
    yLabel.appendChild(yText);
    const yCount = document.createElement('span');
    yCount.className = 'vault-year-count';
    yCount.textContent = items.length + ' saved';
    yLabel.appendChild(yCount);
    section.appendChild(yLabel);

    items.forEach(sv => {
      const item = document.createElement('div');
      item.className = 'vault-item';
      item.title = 'Click to load';

      const info = document.createElement('div');
      info.className = 'vault-item-info';

      const nameEl = document.createElement('div');
      nameEl.className = 'vault-item-name';
      nameEl.textContent = sv.name;
      info.appendChild(nameEl);

      const metaEl = document.createElement('div');
      metaEl.className = 'vault-item-meta';
      metaEl.textContent = sv.mode === 'within' ? sv.label || 'Option A' : 'Across Years';
      info.appendChild(metaEl);

      item.appendChild(info);

      const delBtn = document.createElement('button');
      delBtn.className = 'vault-item-del';
      delBtn.textContent = '×';
      delBtn.title = 'Delete';
      delBtn.addEventListener('click', e => {
        e.stopPropagation();
        savedVariations = savedVariations.filter(x => x.id !== sv.id);
        renderSavedList();
        scheduleStateSave();
      });
      item.appendChild(delBtn);

      item.addEventListener('click', () => loadSavedVariation(sv));
      section.appendChild(item);
    });

    list.appendChild(section);
  });
}

// ────────────────────────────────────────────────────────────────────────────
// RENDER: Expanded back button overlay
// ────────────────────────────────────────────────────────────────────────────

function renderExpandedBack() {
  // Remove any existing back button
  const existing = document.getElementById('expanded-back-btn');
  if (existing) existing.remove();

  if (appState.expandedCol !== null && !appState.presenting) {
    const btn = document.createElement('button');
    btn.className = 'expanded-back-btn';
    btn.id = 'expanded-back-btn';
    btn.textContent = '\u2190 Back';
    btn.addEventListener('click', exitExpandedView);
    document.getElementById('calendar-container').appendChild(btn);
  }
}

// ────────────────────────────────────────────────────────────────────────────
// MAIN RENDER
// ────────────────────────────────────────────────────────────────────────────

function renderAll() {
  // Broadcast state to all collaborators (host or viewer) unless we're applying incoming state
  if (!_receivingRemote && shareChannel && (shareActive || isViewer)) {
    shareChannel.send({ type: "broadcast", event: "state", payload: getShareState() });
  }
  // Debounced save to Supabase
  scheduleStateSave();
  // Apply rules for all active years
  ALL_YEARS.forEach(yr => applyRules(yr));

  renderScenarioHeaders();
  renderCalendar();
  renderExpandedBack();
}

// ────────────────────────────────────────────────────────────────────────────
// MODE SWITCHING
// ────────────────────────────────────────────────────────────────────────────

function setMode(mode) {
  appState.mode = mode;
  appState.expandedCol = null;

  document.getElementById('mode-within').classList.toggle('active', mode === 'within');
  document.getElementById('mode-across').classList.toggle('active', mode === 'across');
  document.getElementById('mode-master').classList.toggle('active', mode === 'master');
  document.getElementById('mode-current').classList.toggle('active', mode === 'current');

  // Show/hide year controls
  const ySection = document.getElementById('year-section');
  const yTabs = document.getElementById('year-tabs-within');
  const yPills = document.getElementById('year-pills-across');
  const showYears = mode !== 'master';
  if (ySection) ySection.style.display = showYears ? 'flex' : 'none';
  const yDivider = document.getElementById('year-divider');
  if (yDivider) yDivider.style.display = showYears ? 'block' : 'none';
  if (yTabs) yTabs.style.display = (mode === 'within' || mode === 'current') ? 'flex' : 'none';
  if (yPills) yPills.style.display = mode === 'across' ? 'flex' : 'none';

  // Show/hide scenario count buttons (within-year only)
  document.getElementById('iter-section').style.display = mode === 'within' ? 'flex' : 'none';
  document.getElementById('iter-divider').style.display = mode === 'within' ? 'block' : 'none';

  // Show/hide overlay button (Planner mode only)
  const showOverlay = mode === 'master';
  document.getElementById('overlay-section').style.display = showOverlay ? 'flex' : 'none';
  document.getElementById('overlay-divider').style.display = showOverlay ? 'block' : 'none';

  // Show/hide reset button (hide in master/planner mode — nothing to reset there)
  const showReset = mode !== 'master';
  document.getElementById('reset-section').style.display = showReset ? 'flex' : 'none';
  document.getElementById('reset-divider').style.display = showReset ? 'block' : 'none';

  renderAll();
}

// ────────────────────────────────────────────────────────────────────────────
// MASTER SCHEDULE RENDERER
// ────────────────────────────────────────────────────────────────────────────

function renderMasterHeaders() {
  const container = document.getElementById('scenario-headers');
  container.innerHTML = '';

  const spacer = document.createElement('div');
  spacer.className = 'scenario-header-spacer';
  container.appendChild(spacer);

  ALL_YEARS.forEach(yr => {
    const hasMaster = Object.keys(masterPlacements[yr]).length > 0;
    const header = document.createElement('div');
    header.className = 'scenario-header';
    header.style.borderRight = '1px solid var(--border)';

    const labelWrap = document.createElement('div');
    labelWrap.className = 'scenario-label-wrap';

    const idxSpan = document.createElement('span');
    idxSpan.className = 'scenario-index';
    idxSpan.style.background = hasMaster ? '#3a7a2a' : '#aaa';
    idxSpan.textContent = yr.replace('-','–');
    labelWrap.appendChild(idxSpan);

    const statusEl = document.createElement('span');
    statusEl.style.cssText = 'font-size:7pt;color:'+ (hasMaster ? '#3a7a2a' : '#bbb') + ';font-weight:700;flex:1;';
    statusEl.textContent = hasMaster ? 'Planner set': 'Not set — go to Within Year and click → Save to Planner';
    labelWrap.appendChild(statusEl);

    if (hasMaster) {
      const clearBtn = document.createElement('button');
      clearBtn.style.cssText = 'font-size:6.5pt;font-weight:700;background:none;border:1px solid #ddd;border-radius:3px;padding:2px 6px;cursor:pointer;color:#aaa;white-space:nowrap;flex-shrink:0;';
      clearBtn.textContent = '× Clear';
      clearBtn.title = 'Clear Planner for ' + yr.replace('-','–');
      clearBtn.addEventListener('mouseover', () => { clearBtn.style.borderColor='#e07070'; clearBtn.style.color='#c03030'; });
      clearBtn.addEventListener('mouseout',  () => { clearBtn.style.borderColor='#ddd';    clearBtn.style.color='#aaa'; });
      clearBtn.addEventListener('click', () => {
        masterPlacements[yr] = {};
        masterRules[yr] = { keepIndividuals: false,keepHsNationals: false };
        renderScenarioHeaders();
        renderCalendar();
      });
      labelWrap.appendChild(clearBtn);
    }

    header.appendChild(labelWrap);
    container.appendChild(header);
  });

  // Re-apply collapsed state
  if (bankCollapsed) {
    container.classList.add('collapsed');
    document.getElementById('collapsed-bar').classList.add('visible');
  }
}

function renderMasterCalendar(cal) {
  // Build rows from ALL 4 years so no weekends are missed
  const seen = [];
  const seenSet = new Set();
  ALL_YEARS.forEach(yr => {
    yearData[yr].weekends.forEach(w => {
      if (!seenSet.has(w.relLabel)) { seenSet.add(w.relLabel); seen.push(w.relLabel); }
    });
  });
  const relRows = seen;
  const presenting = appState.presenting;
  let lastMonth = null;

  relRows.forEach(relLabel => {
    const month = relLabel.split(' ')[0];
    const fullMonth = { Jan: 'January', Feb: 'February', Mar: 'March', Oct: 'October', Nov: 'November', Dec: 'December' }[month] || month;
    // Season filter
    const anyMatchM = ALL_YEARS.some(yr => {
      const w = yearData[yr].weekends.find(x => x.relLabel === relLabel);
      return w && weekendMatchesSeason(w);
    });
    if (!anyMatchM) return;
    if (fullMonth !== lastMonth) {
      cal.appendChild(makeMonthHeader(fullMonth));
      lastMonth = fullMonth;
    }

    const row = document.createElement('div');
    row.className = 'weekend-row';

    // Row label
    const lbl = document.createElement('div');
    lbl.className = 'wknd-label';
    const relParts = relLabel.split(' ');
    const relMonth = document.createElement('div');
    relMonth.className = 'wknd-month';
    relMonth.textContent = relParts[0];
    lbl.appendChild(relMonth);
    const dateDiv = document.createElement('div');
    dateDiv.className = 'wknd-date';
    dateDiv.style.fontSize = '13pt';
    dateDiv.textContent = relParts[1] || relLabel;
    lbl.appendChild(dateDiv);
    const relDaynames = document.createElement('div');
    relDaynames.className = 'wknd-daynames';
    relDaynames.textContent = 'Fri – Sun';
    lbl.appendChild(relDaynames);
    row.appendChild(lbl);

    ALL_YEARS.forEach((yr, renderPos) => {
      const hasMaster = Object.keys(masterPlacements[yr]).length > 0;
      const wknd = yearData[yr].weekends.find(w => w.relLabel === relLabel);
      const lockedSet = getLockedSet(yr, masterRules[yr]);

      if (!hasMaster || !wknd) {
        const empty = document.createElement('div');
        empty.className = 'master-empty-col';
        empty.textContent = hasMaster ? '' : '—';
        row.appendChild(empty);
        return;
      }

      const evIds = (masterPlacements[yr][wknd.key]|| []).filter(Boolean);
      // Master/Planner view is read-only — pass true for presenting to skip drag binding
      const zone = makeDropZone(evIds, renderPos, wknd, yr, lockedSet, true, true);

      // Overlay: show Current events as ghost chips
      if (appState.overlayOn) {
        const currentIds = (currentPlacements[yr][wknd.key] || []).filter(Boolean);
        const ghostIds = currentIds.filter(id => !evIds.includes(id));
        const sameIds = currentIds.filter(id => evIds.includes(id));
        if (currentIds.length > 0) {
          // Divider with label
          const divider = document.createElement('div');
          divider.className = 'ghost-divider';
          const lbl = document.createElement('span');
          lbl.className = 'ghost-label';
          lbl.textContent = 'Current';
          divider.appendChild(lbl);
          zone.appendChild(divider);
          // Ghost chips (events in Current but not in Planner)
          ghostIds.forEach(evId => {
            const ev = evById(evId);
            const ghost = document.createElement('div');
            ghost.className = 'chip ghost ' + (ev ? ev.type : 'csa');
            ghost.style.cssText = 'flex:1 1 auto;min-width:max-content;font-size:13pt;padding:6px 12px;display:flex;align-items:center;gap:4px;';
            const orgBadge = document.createElement('span');
            orgBadge.className = 'chip-org';
            orgBadge.textContent = (ev && ev.type === 'us') ? 'USS' : 'CSA';
            ghost.appendChild(orgBadge);
            const nameEl = document.createElement('span');
            nameEl.style.flex = '1';
            nameEl.textContent = ev ? ev.name : evId;
            ghost.appendChild(nameEl);
            zone.appendChild(ghost);
          });
          // Events in both — mark Planner chips with a green tick
          if (sameIds.length > 0) {
            zone.querySelectorAll('.chip:not(.ghost)').forEach(chip => {
              if (sameIds.includes(chip.dataset.id)) {
                chip.style.outline = '2px solid #6ab870';
                chip.title = 'Also in Current calendar';
              }
            });
          }
        }
      }

      row.appendChild(zone);
    });

    cal.appendChild(row);
  });
}

// ────────────────────────────────────────────────────────────────────────────
// CURRENT CALENDAR RENDERER
// ────────────────────────────────────────────────────────────────────────────

function renderCurrentHeaders() {
  const container = document.getElementById('scenario-headers');
  container.innerHTML = '';

  const spacer = document.createElement('div');
  spacer.className = 'scenario-header-spacer';
  container.appendChild(spacer);

  const yr = appState.withinYear;
  const header = document.createElement('div');
  header.className = 'scenario-header';

  const labelWrap = document.createElement('div');
  labelWrap.className = 'scenario-label-wrap';
  const idxSpan = document.createElement('span');
  idxSpan.className = 'scenario-index';
  idxSpan.style.background = '#4a7a4a';
  idxSpan.textContent = yr.replace('-','–');
  labelWrap.appendChild(idxSpan);
  const label = document.createElement('span');
  label.className = 'scenario-label-input';
  label.style.cursor = 'default';
  label.textContent = 'Current Calendar';
  labelWrap.appendChild(label);
  header.appendChild(labelWrap);

  if (!appState.presenting) {
    const note = document.createElement('div');
    note.style.cssText = 'font-size:6.5pt;color:#888;margin-top:4px;font-style:italic;';
    note.textContent = 'Drag events to set the existing schedule baseline';
    header.appendChild(note);
  }

  container.appendChild(header);

  if (bankCollapsed) {
    container.classList.add('collapsed');
    document.getElementById('collapsed-bar').classList.add('visible');
  } else {
    container.classList.remove('collapsed');
    document.getElementById('collapsed-bar').classList.remove('visible');
  }
}

function renderCurrentCalendar(cal) {
  const yr = appState.withinYear;
  const data = yearData[yr];
  const presenting = appState.presenting;

  let lastRenderedMonthC = null;
  data.weekends.forEach(wknd => {
    if (!weekendMatchesSeason(wknd)) return;
    if (wknd.month && wknd.month !== lastRenderedMonthC) {
      cal.appendChild(makeMonthHeader(wknd.month));
      lastRenderedMonthC = wknd.month;
    }
    const row = makeWeekendRow(wknd, yr, presenting);
    const evIds = (currentPlacements[yr][wknd.key] || []).filter(Boolean);
    const zone = makeCurrentDropZone(evIds, wknd, yr, presenting);
    row.appendChild(zone);
    cal.appendChild(row);
  });
}

function makeCurrentDropZone(evIds, wknd, yr, presenting) {
  const zone = document.createElement('div');
  zone.className = 'drop-zone';
  zone.dataset.colIndex = 99; // sentinel for current
  zone.dataset.key = wknd.key;
  zone.dataset.year = yr;

  if (evIds.length === 0 && !presenting) {
    const hint = document.createElement('span');
    hint.className = 'drop-hint';
    hint.textContent = 'drop here';
    zone.appendChild(hint);
  } else {
    evIds.forEach(evId => {
      const chip = makeChip(evId, { removable: !presenting, colIndex: 99, fromKey: wknd.key, year: yr });
      if (!presenting) bindCurrentChipDrag(chip, wknd.key, yr);
      zone.appendChild(chip);
    });
  }

  if (!presenting) bindCurrentDropZone(zone, wknd.key, yr);
  return zone;
}

function bindCurrentChipDrag(chip, fromKey, year) {
  chip.addEventListener('dragstart', e => {
    dragId = chip.dataset.id;
    dragColIndex = 99;
    dragSourceKey = fromKey;
    dragYear = year;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => chip.classList.add('dragging'), 0);
  });
  chip.addEventListener('dragend', () => {
    chip.classList.remove('dragging');
    clearDragActive();
    dragId = null; dragColIndex = null; dragSourceKey = null; dragYear = null;
  });
}

function bindCurrentDropZone(zone, weekendKey, year) {
  zone.addEventListener('dragover', e => {
    if (dragColIndex === 99 && dragYear === year) { e.preventDefault(); zone.classList.add('drag-over'); }
  });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', e => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    if (dragId === null || dragColIndex !== 99 || dragYear !== year) return;
    if (dragSourceKey !== null) {
      currentPlacements[year][dragSourceKey] = (currentPlacements[year][dragSourceKey] || []).filter(x => x !== dragId);
    }
    if (!currentPlacements[year][weekendKey]) currentPlacements[year][weekendKey] = [];
    if (!currentPlacements[year][weekendKey].includes(dragId)) currentPlacements[year][weekendKey].push(dragId);
    dragId = null; dragColIndex = null; dragSourceKey = null; dragYear = null;
    renderAll();
  });
}

// ────────────────────────────────────────────────────────────────────────────
// CONTROLS: Event Bindings
// ────────────────────────────────────────────────────────────────────────────

// Mode buttons
document.getElementById('mode-within').addEventListener('click', () => setMode('within'));
document.getElementById('mode-across').addEventListener('click', () => setMode('across'));
document.getElementById('mode-master').addEventListener('click', () => setMode('master'));
document.getElementById('mode-current').addEventListener('click', () => {
  appState.withinYear = document.querySelector('.year-tab.active')?.dataset.year || appState.withinYear;
  setMode('current');
});

// Reset button + modal
document.getElementById('btn-reset').addEventListener('click', () => {
  const yr = appState.withinYear;
  const count = appState.scenarioCount;
  const sub = document.getElementById('reset-modal-sub');
  const btns = document.getElementById('reset-modal-btns');

  sub.textContent = yr.replace('-','–') + ' — select a scenario to clear';
  btns.innerHTML = '';

  const targets = [];
  if (appState.mode === 'within') {
    for (let i = 0; i < count; i++) {
      targets.push({ label: scenarioLabels[yr][i] + ' (Scenario ' + (i+1) + ')', idx: i, yr });
    }
  } else if (appState.mode === 'across') {
    appState.acrossYears.forEach(y => targets.push({ label: y.replace('-','–'), idx: null, yr: y, across: true }));
  } else if (appState.mode === 'current') {
    targets.push({ label: yr.replace('-','–') + ' — Current Calendar', idx: null, yr, current: true });
  }

  if (targets.length === 0) {
    sub.textContent = 'Nothing to reset in this mode.';
  }

  targets.forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'reset-scenario-btn';
    btn.textContent = '↺  Clear ' + t.label;
    btn.addEventListener('click', () => {
      if (t.across) {
        crossPlacements[t.yr] = {};
      } else if (t.current) {
        currentPlacements[t.yr] = {};
      } else {
        placements[t.yr][t.idx] = {};
      }
      closeResetModal();
      renderAll();
    });
    btns.appendChild(btn);
  });

  document.getElementById('reset-backdrop').classList.add('open');
});

function closeResetModal() {
  document.getElementById('reset-backdrop').classList.remove('open');
}
document.getElementById('reset-cancel').addEventListener('click', closeResetModal);
document.getElementById('reset-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('reset-backdrop')) closeResetModal();
});

// Overlay toggle
document.getElementById('btn-overlay').addEventListener('click', () => {
  appState.overlayOn = !appState.overlayOn;
  document.getElementById('btn-overlay').classList.toggle('on', appState.overlayOn);
  document.getElementById('btn-overlay').textContent = appState.overlayOn ? '⊕ Hide Current' : '⊕ Show Current';
  renderAll();
});


// Season toggle
document.querySelectorAll('.season-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.season-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    appState.seasonFilter = btn.dataset.season;
    renderAll();
  });
});

// Within-year tab selection
document.querySelectorAll('.year-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.year-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    appState.withinYear = tab.dataset.year;
    appState.expandedCol = null;
    renderAll();
  });
});

// Across-years pill toggle
document.querySelectorAll('.year-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const yr = pill.dataset.year;
    const idx = appState.acrossYears.indexOf(yr);
    if (idx === -1) {
      // Add, max 4
      if (appState.acrossYears.length < 4) {
        appState.acrossYears.push(yr);
        pill.classList.add('active');
      }
    } else {
      // Remove, min 2
      if (appState.acrossYears.length > 2) {
        appState.acrossYears.splice(idx, 1);
        pill.classList.remove('active');
      }
    }
    renderAll();
  });
});

// Scenario count buttons
document.querySelectorAll('.iter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.iter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    appState.scenarioCount = parseInt(btn.dataset.count);
    appState.expandedCol = null;
    renderAll();
  });
});

// Present button
document.getElementById('btn-present').addEventListener('click', () => {
  appState.presenting = true;
  document.body.classList.add('presenting');
  renderAll();
});

// Exit presentation
document.getElementById('exit-present-btn').addEventListener('click', () => {
  appState.presenting = false;
  document.body.classList.remove('presenting');
  renderAll();
});

// Saved drawer toggle
document.getElementById('btn-show-saved').addEventListener('click', () => {
  appState.savedDrawerOpen = !appState.savedDrawerOpen;
  document.getElementById('saved-drawer').classList.toggle('hidden', !appState.savedDrawerOpen);
  document.getElementById('btn-show-saved').classList.toggle('highlight', appState.savedDrawerOpen && savedVariations.length > 0);
  if (appState.savedDrawerOpen) renderSavedList();
});

document.getElementById('saved-drawer-close').addEventListener('click', () => {
  appState.savedDrawerOpen = false;
  document.getElementById('saved-drawer').classList.add('hidden');
  document.getElementById('btn-show-saved').classList.remove('highlight');
});


// ────────────────────────────────────────────────────────────────────────────
// ADD EVENT
// ────────────────────────────────────────────────────────────────────────────

function openAddEventModal() {
  document.getElementById('ae-name').value = '';
  document.getElementById('ae-type').value = 'csa';
  document.getElementById('ae-location').value = '';
  document.getElementById('ae-error').textContent = '';
  document.getElementById('add-event-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('ae-name').focus(), 50);
}

function closeAddEventModal() {
  document.getElementById('add-event-backdrop').classList.remove('open');
}

function doAddEvent() {
  const name = document.getElementById('ae-name').value.trim();
  const type = document.getElementById('ae-type').value;
  const location = document.getElementById('ae-location').value.trim();
  const errEl = document.getElementById('ae-error');

  if (!name) { errEl.textContent = 'Event name is required.'; return; }

  // Generate a unique ID from name
  const id = 'custom-' + name.toLowerCase().replace(/[^a-z0-9]+/g, '-') + '-' + Date.now();

  if (ALL_EVENTS.find(e => e.name.toLowerCase() === name.toLowerCase())) {
    errEl.textContent = 'An event with that name already exists.';
    return;
  }

  const ev = { id, name, type, custom: true };
  if (location) ev.location = location;
  ALL_EVENTS.push(ev);

  closeAddEventModal();
  scheduleStateSave();
  renderAll();
}

document.getElementById('btn-add-event').addEventListener('click', openAddEventModal);
document.getElementById('ae-cancel').addEventListener('click', closeAddEventModal);
document.getElementById('ae-save').addEventListener('click', doAddEvent);
document.getElementById('ae-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') doAddEvent();
});
document.getElementById('add-event-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('add-event-backdrop')) closeAddEventModal();
});

// ────────────────────────────────────────────────────────────────────────────
const btnFS = document.getElementById('btn-fullscreen');
btnFS.addEventListener('click', () => {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(() => {});
  } else {
    document.exitFullscreen().catch(() => {});

  bankCollapsed = !bankCollapsed;
  document.getElementById('scenario-headers').classList.toggle('collapsed', bankCollapsed);
  document.getElementById('collapsed-bar').classList.toggle('visible', bankCollapsed);
}

document.getElementById('expand-btn').addEventListener('click', toggleEventBank);

// INIT
// ────────────────────────────────────────────────────────────────────────────
renderAll();
